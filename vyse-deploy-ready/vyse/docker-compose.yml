# Local dev stack. Runs with zero external API keys (AUTH_MODE=dev, AI stub).
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vyse
      POSTGRES_PASSWORD: vyse
      POSTGRES_DB: vyse
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vyse"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: ./apps/api
    command: uvicorn vyse_api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vyse:vyse@db:5432/vyse
      REDIS_URL: redis://redis:6379
    ports: ["8000:8000"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
    volumes: ["./apps/api:/app"]

  worker:
    build: ./apps/api
    command: arq vyse_api.worker.main.WorkerSettings
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vyse:vyse@db:5432/vyse
      REDIS_URL: redis://redis:6379
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
    volumes: ["./apps/api:/app"]

volumes:
  pgdata:
