# Render Blueprint — brings up VYSE's backend stack in one shot:
#   API (web) + worker (background) + Redis (key value) + Postgres (pgvector).
# Deploy:  Render dashboard -> New -> Blueprint -> point at this repo.
# The frontend (apps/web) deploys on Vercel; set NEXT_PUBLIC_API_URL to the
# vyse-api URL Render gives you. See DEPLOY.md.

databases:
  - name: vyse-db
    plan: free                 # NOTE: Render's free Postgres is time-limited. For a DB
    postgresMajorVersion: "16" # you want to keep, delete this block and set DATABASE_URL
                               # (sync:false) on the services to your Supabase URL instead.

services:
  # ---------- FastAPI ----------
  - type: web
    name: vyse-api
    runtime: docker
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn vyse_api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: starter              # worker/web need to stay awake; free tier sleeps
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: AUTO_INIT_DB
        value: "true"          # API owns schema bootstrap (pgvector + tables)
      - key: AUTH_MODE
        value: dev             # switch to "clerk" + add Clerk keys for real multi-user auth
      - key: DATABASE_URL
        fromDatabase:
          name: vyse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: vyse-redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false            # set to your Vercel domain, e.g. https://vyse.vercel.app
      - key: OPENAI_API_KEY
        sync: false            # optional — blank => deterministic offline stub
      - key: YOUTUBE_API_KEY
        sync: false            # optional — durable metrics

  # ---------- Arq worker (the pipeline) ----------
  - type: worker
    name: vyse-worker
    runtime: docker
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    dockerCommand: arq vyse_api.worker.main.WorkerSettings
    plan: starter
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: AUTO_INIT_DB
        value: "false"         # only the API initializes the DB
      - key: DATABASE_URL
        fromDatabase:
          name: vyse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: vyse-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false

  # ---------- Redis (Arq broker) ----------
  - type: keyvalue
    name: vyse-redis
    plan: free
    ipAllowList: []            # internal services only
    maxmemoryPolicy: noeviction  # never evict queued jobs
