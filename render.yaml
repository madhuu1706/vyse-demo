services:
  # ---------- FastAPI ----------
  - type: web
    name: vyse-api
    runtime: docker
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn vyse_api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: AUTO_INIT_DB
        value: "true"
      - key: AUTH_MODE
        value: dev
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: vyse-redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false

  # ---------- Worker ----------
  - type: worker
    name: vyse-worker
    runtime: docker
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    dockerCommand: arq vyse_api.worker.main.WorkerSettings
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: AUTO_INIT_DB
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: vyse-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false

  # ---------- Redis ----------
  - type: keyvalue
    name: vyse-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction